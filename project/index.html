<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TerraCheck</title>

    <link rel="stylesheet" href="./CSS/style.css">
    <script src="./JS/script.js" defer></script>
</head>
<body>
    
    <img id="RotatingEarth" src="./IMG/Earth.gif" alt="EarthSpinning">
    <img id="RotatingMoon" src="./IMG/Moon.gif" alt="MoonSpinning">

    <div id="Homepage">
        <div id="HomepageInputGrid">
            <p id="HomepageInputGridHeader">TERRACHECK</p>
            <p class="HomepageInputGridText" onclick="showNextScreen('Homepage', 'GameMode')">SPIELEN</p>
            <p class="HomepageInputGridText" onclick="showNextScreen('Homepage', 'Options')">OPTIONEN</p>
            <p class="HomepageInputGridText" onclick="showNextScreen('Homepage', 'Rules')">REGELN</p>
        </div>
    </div>

    <div id="Options">
        <img class="ReturnButton" onclick="showNextScreen('Options', 'Homepage')" src="./IMG/Return.png" alt="Return">
        <div id="OptionsInputGrid">
            <p id="OptionsInputGridHeader">OPTIONEN</p>
            <p class="OptionsInputGridText" onclick="showNextScreen('', '')">VIDEO</p>
            <p class="OptionsInputGridText" onclick="showNextScreen('', '')">AUDIO</p>
            <p class="OptionsInputGridText" onclick="showNextScreen('', '')">KONTO</p>
        </div>
        <div id="OptionsSetArea">
            <div id="OptionsVideoArea"></div>
            <div id="OptionsAudioArea"></div>
            <div id="OptionsKontoArea"></div>
        </div>
    </div>

    <div id="Rules">
        <img class="ReturnButton" onclick="showNextScreen('Rules', 'Homepage')" src="./IMG/Return.png" alt="Return">
        <div id="RulesBoxArea">
            <section class="Box">Box 1</section>
            <section class="Box">Box 2</section>
            <section class="Box">Box 3</section>
        </div>
    </div>

    <div id="GameMode">
        <img class="ReturnButton" onclick="showNextScreen('GameMode', 'Homepage')" src="./IMG/Return.png" alt="Return">
        <div id="GameModeGrid">
            <div class="GameModeMaps MapWorld" onclick="generateGameModeOptions(this, 0)"></div>
            <div class="GameModeMaps MapEurope" onclick="generateGameModeOptions(this, 1)"></div>
            <div class="GameModeMaps MapAsia" onclick="generateGameModeOptions(this, 2)"></div>
            <div class="GameModeMaps MapAfrica" onclick="generateGameModeOptions(this, 3)"></div>
            <div class="GameModeMaps MapNorthAmerica" onclick="generateGameModeOptions(this, 4)"></div>
            <div class="GameModeMaps MapSouthAmerica" onclick="generateGameModeOptions(this, 5)"></div>
            <div class="GameModeMaps MapAustralia" onclick="generateGameModeOptions(this, 6)"></div>
            <div class="GameModeMaps MapSuprise" onclick="generateGameModeOptions(this, 7)"></div>
        </div>
    </div>

    <div id="GameScreen">
        <img class="ReturnButton" onclick="showNextScreen('GameScreen', 'GameMode')" src="./IMG/Return.png" alt="Return">
        <div id="ActualGameScreen"></div>
    </div>
</body>
</html>
