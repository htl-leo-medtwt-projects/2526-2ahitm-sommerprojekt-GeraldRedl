<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TerraCheck</title>

    <link href="./aos_libary/aos_libary/aos_style.css" rel="stylesheet">
    <script src="./aos_libary/aos_libary/aos_script.js" defer></script>

    <link rel="stylesheet" href="./CSS/style.css">
    <script src="./JS/data.js" defer></script>
    <script src="./JS/script.js" defer></script>
    <script src="./JS/tutorial.js" defer></script>
</head>
<body id="body">
    
    <img id="RotatingEarth" src="./IMG/Earth.gif" alt="EarthSpinning" data-aos="zoom-in">
    <img id="RotatingMoon" src="./IMG/Moon.gif" alt="MoonSpinning">

    <div id="AllowAudioScreen">
        <div id="AudioPermissionBox">
            <p id="AudioPermissionTitle">AUDIO ERLAUBEN</p>
            <p id="AudioPermissionText">Genießen Sie die volle TerraCheck-Erfahrung mit Sound</p>
            <div id="AudioPermissionButtons">
                <p class="AudioPermissionBtn" onclick="allowAudio(true)">JA</p>
                <p class="AudioPermissionBtn" onclick="allowAudio(false)">NEIN</p>
            </div>
        </div>
    </div>

    <div id="Homepage">
        <div id="HomepageInputGrid">
            <p id="HomepageInputGridHeader">TERRACHECK</p>
            <p data-aos="fade-right" data-aos-delay="300" class="HomepageInputGridText" onclick="showNextScreen('Homepage', 'GameMode')">SPIELEN</p>
            <p data-aos="fade-right" data-aos-delay="450" class="HomepageInputGridText" onclick="showNextScreen('Homepage', 'Options')">OPTIONEN</p>
            <p data-aos="fade-right" data-aos-delay="600" class="HomepageInputGridText" onclick="showNextScreen('Homepage', 'Rules')">LÄNDER</p>
        </div>
    </div>

    <div id="Options">
        <img class="ReturnButton" onclick="showNextScreen('Options', 'Homepage')" src="./IMG/Return.png" alt="Return">
        <div id="OptionsInputGrid">
            <p id="OptionsInputGridHeader">OPTIONEN</p>
            <p class="OptionsInputGridText" onclick="generateOptionsVideo()">VIDEO</p>
            <p class="OptionsInputGridText" onclick="generateOptionsAudio()">AUDIO</p>
            <p class="OptionsInputGridText" onclick="generateOptionsKonto()">KONTO</p>
        </div>
        <div id="OptionsSetArea">
            <div id="OptionsSetSetArea"></div>
        </div>
    </div>

    <div id="Rules">
        <img class="ReturnButton" onclick="showNextScreen('Rules', 'Homepage')" src="./IMG/Return.png" alt="Return">
        <div id="RulesNavigation">
            <p class="RulesNavButton" onclick="filterByAllCountries()">ALL</p>
            <div id="RulesLetterContainer"></div>
        </div>
        <div id="RulesBoxArea">
            
        </div>
    </div>

    <div id="GameMode">
        <img class="ReturnButton" onclick="showNextScreen('GameMode', 'Homepage')" src="./IMG/Return.png" alt="Return">
        <div id="GameModeGrid">
            <div class="GameModeMaps MapWorld" onclick="generateGameModeOptions(this, 0, 'World')"></div>
            <div class="GameModeMaps MapEurope" onclick="generateGameModeOptions(this, 1, 'Europe')"></div>
            <div class="GameModeMaps MapAsia" onclick="generateGameModeOptions(this, 2, 'Asia')"></div>
            <div class="GameModeMaps MapAfrica" onclick="generateGameModeOptions(this, 3, 'Africa')"></div>
            <div class="GameModeMaps MapNorthAmerica" onclick="generateGameModeOptions(this, 4, 'NorthAmerica')"></div>
            <div class="GameModeMaps MapSouthAmerica" onclick="generateGameModeOptions(this, 5, 'SouthAmerica')"></div>
            <div class="GameModeMaps MapAustralia" onclick="generateGameModeOptions(this, 6, 'Australia')"></div>
            <div class="GameModeMaps MapSuprise" onclick="generateGameModeOptions(this, 7, '')"></div>
        </div>
    </div>

    <div id="GameScreen">
        <img class="ReturnButton" onclick="showNextScreen('GameScreen', 'GameMode')" src="./IMG/Return.png" alt="Return">
        <div id="ActualGameScreen"></div>
    </div>
</body>
</html>
