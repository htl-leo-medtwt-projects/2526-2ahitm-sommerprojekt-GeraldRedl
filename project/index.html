<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TerraCheck</title>

    <link rel="stylesheet" href="./CSS/style.css">
    <script src="./JS/script.js" defer></script>
</head>
<body>
    
    <img id="RotatingEarth" src="./IMG/Earth.gif" alt="EarthSpinning">
    <img id="RotatingMoon" src="./IMG/Moon.gif" alt="MoonSpinning">

    <div id="Homepage">
        <div id="HomepageInputGrid">
            <p id="HomepageInputGridHeader">TERRACHECK</p>
            <p class="HomepageInputGridText" onclick="showNextScreen('Homepage', '')">SPIELEN</p>
            <p class="HomepageInputGridText" onclick="showNextScreen('Homepage', 'Options')">OPTIONEN</p>
            <p class="HomepageInputGridText" onclick="showNextScreen('Homepage', 'Rules')">REGELN</p>
        </div>
    </div>

    <div id="Options">
        <img class="ReturnButton" onclick="showNextScreen('Options', 'Homepage')" src="./IMG/Return.png" alt="Return">
        <div id="OptionsInputGrid">
            <p id="OptionsInputGridHeader">OPTIONEN</p>
            <p class="OptionsInputGridText" onclick="showNextScreen('Options', '')">VIDEO</p>
            <p class="OptionsInputGridText" onclick="showNextScreen('Options', '')">AUDIO</p>
            <p class="OptionsInputGridText" onclick="showNextScreen('Options', '')">KONTO</p>
        </div>
        <div id="OptionsSetArea">
            <div id="OptionsVideoArea"></div>
            <div id="OptionsAudioArea"></div>
            <div id="OptionsKontoArea"></div>
        </div>
    </div>

    <div id="Rules"></div>
</body>
</html>
